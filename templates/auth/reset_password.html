{% extends "base.html" %}
{% block title %}Reset Password - NeuroSent{% endblock %}

{% block unauth_content %}
<div class="flex items-center justify-center min-h-[80vh] px-4 animate-fade-in relative z-10">
    <div class="w-full max-w-md p-8 sm:p-10 glass rounded-3xl shadow-2xl relative overflow-hidden backdrop-blur-xl border border-white/20 dark:border-gray-700/50">
        
        <div class="absolute -bottom-16 -right-16 w-40 h-40 bg-emerald-500/20 rounded-full blur-3xl pointer-events-none transform animate-pulse transition-all"></div>
        <div class="absolute -top-16 -left-16 w-40 h-40 bg-teal-500/20 rounded-full blur-3xl pointer-events-none transform animate-pulse animation-delay-2000 transition-all"></div>

        <div class="relative z-10 text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-emerald-100 dark:bg-emerald-900/30 mb-4 shadow-inner ring-4 ring-white/50 dark:ring-gray-700/50">
                <i class="fa-solid fa-shield-halved text-2xl text-emerald-500 dark:text-emerald-400"></i>
            </div>
            <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white mb-2 tracking-tight">Create New Password</h2>
            <p class="text-sm text-gray-500 dark:text-gray-400 font-medium">Your identity has been verified. Choose a strong new password.</p>
        </div>

        <form method="POST" action="{{ url_for('recovery.reset_password') }}" class="relative z-10 space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div>
                <label for="password" class="block mb-2 text-sm font-semibold text-gray-900 dark:text-gray-300">New Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                        <i class="fa-solid fa-lock text-primary-400"></i>
                    </div>
                    <input type="password" name="password" id="password" class="bg-white/60 border border-gray-300/50 text-gray-900 sm:text-sm rounded-xl focus:ring-primary-500 focus:border-primary-500 block w-full pl-11 p-3.5 dark:bg-gray-700/60 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white shadow-sm transition-all focus:bg-white dark:focus:bg-gray-800" placeholder="••••••••" required="">
                </div>
            </div>
            <div>
                <label for="confirm_password" class="block mb-2 text-sm font-semibold text-gray-900 dark:text-gray-300">Confirm Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                        <i class="fa-solid fa-lock text-primary-400"></i>
                    </div>
                    <input type="password" name="confirm_password" id="confirm_password" placeholder="••••••••" class="bg-white/60 border border-gray-300/50 text-gray-900 sm:text-sm rounded-xl focus:ring-primary-500 focus:border-primary-500 block w-full pl-11 p-3.5 dark:bg-gray-700/60 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white shadow-sm transition-all focus:bg-white dark:focus:bg-gray-800" required="">
                </div>
            </div>
            
            <button type="submit" class="w-full text-white bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 focus:ring-4 focus:outline-none focus:ring-teal-300 font-bold rounded-xl text-sm px-5 py-3.5 text-center dark:focus:ring-teal-900 shadow-lg hover:shadow-xl transform transition-all hover:-translate-y-0.5 mt-2">
                <i class="fa-solid fa-check mr-2"></i> Update Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
