<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Access Denied | NeuroSent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || !('color-theme' in localStorage)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex items-center justify-center p-4">
    <div class="text-center max-w-md mx-auto">
        <div class="w-24 h-24 mx-auto mb-6 bg-red-100 dark:bg-red-900/30 rounded-full flex items-center justify-center">
            <i class="fa-solid fa-shield-halved text-4xl text-red-600 dark:text-red-400"></i>
        </div>
        <h1 class="text-6xl font-extrabold text-gray-900 dark:text-white mb-2">403</h1>
        <h2 class="text-xl font-bold text-gray-700 dark:text-gray-300 mb-4">Access Denied</h2>
        <p class="text-gray-500 dark:text-gray-400 mb-6 leading-relaxed">
            You do not have permission to access this resource. 
            If you believe this is an error, please contact your system administrator.
        </p>
        <div class="flex justify-center gap-3">
            <a href="/" class="inline-flex items-center px-6 py-3 text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 rounded-xl transition-colors shadow-lg">
                <i class="fa-solid fa-home mr-2"></i> Return Home
            </a>
            <button onclick="history.back()" class="inline-flex items-center px-6 py-3 text-sm font-semibold text-gray-700 dark:text-gray-300 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 rounded-xl transition-colors">
                <i class="fa-solid fa-arrow-left mr-2"></i> Go Back
            </button>
        </div>
    </div>
</body>
</html>
