{% extends "base.html" %}
{% block title %}Forgot Password - NeuroSent{% endblock %}

{% block unauth_content %}
<div id="vanta-bg" class="fixed inset-0 z-0 pointer-events-none opacity-50 mix-blend-screen transition-opacity duration-1000"></div>

<div class="flex items-center justify-center min-h-[80vh] px-4 animate-fade-in relative z-10">
    <div class="w-full max-w-md p-8 sm:p-10 glass rounded-3xl shadow-2xl relative overflow-hidden backdrop-blur-xl border border-white/20 dark:border-gray-700/50">
        
        <div class="absolute -bottom-16 -right-16 w-40 h-40 bg-amber-500/20 rounded-full blur-3xl pointer-events-none transform animate-pulse transition-all"></div>
        <div class="absolute -top-16 -left-16 w-40 h-40 bg-orange-500/20 rounded-full blur-3xl pointer-events-none transform animate-pulse animation-delay-2000 transition-all"></div>

        <div class="relative z-10 text-center mb-8">
            <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white mb-2 tracking-tight">Account Recovery</h2>
            <p class="text-sm text-gray-500 dark:text-gray-400 font-medium">Enter your email and we'll send you a secure 6-digit OTP code.</p>
        </div>

        <form method="POST" action="{{ url_for('recovery.forgot_password') }}" class="relative z-10 space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div>
                <label for="email" class="block mb-2 text-sm font-semibold text-gray-900 dark:text-gray-300">Registered Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                        <i class="fa-solid fa-envelope text-primary-400"></i>
                    </div>
                    <input type="email" name="email" id="email" class="bg-white/60 border border-gray-300/50 text-gray-900 sm:text-sm rounded-xl focus:ring-primary-500 focus:border-primary-500 block w-full pl-11 p-3.5 dark:bg-gray-700/60 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white shadow-sm transition-all focus:bg-white dark:focus:bg-gray-800" placeholder="name@company.com" required="">
                </div>
            </div>
            
            <button type="submit" class="w-full text-white bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-600 hover:to-orange-700 focus:ring-4 focus:outline-none focus:ring-orange-300 font-bold rounded-xl text-sm px-5 py-3.5 text-center dark:focus:ring-orange-900 shadow-lg hover:shadow-xl transform transition-all hover:-translate-y-0.5 mt-2">
                <i class="fa-solid fa-paper-plane mr-2"></i> Send OTP Code
            </button>
            <p class="text-sm font-medium text-center text-gray-600 dark:text-gray-400 mt-6">
                Remember your password? <a href="{{ url_for('auth.login') }}" class="font-bold text-primary-600 hover:text-primary-800 dark:text-primary-400 dark:hover:text-primary-300 transition-colors">Back to Login</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
